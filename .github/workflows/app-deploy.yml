# ===============================================================================
# WORKFLOW : Déploiement du Code de l'Application Smart Notes
# DÉCLENCHEMENT : Manuel (workflow_dispatch) ou push sur main dans app/
# NOTE CRITIQUE : Ce workflow ne crée PAS l'infrastructure.
# L'App Service doit déjà exister (déployé via infra-deploy.yml).
# AUTH : Publish Profile (moindre privilège — limité à sn-dev-app uniquement)
# ===============================================================================
name: Application Code Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'app/**'

jobs:
  build-and-deploy:
    name: Build & Deploy App
    runs-on: ubuntu-latest

    steps:
      # 1. Récupération du code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Node.js 20 LTS
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Installation des dépendances
      - name: Install Dependencies
        working-directory: ./app/backend
        run: npm install --omit=dev

      # 4. Déploiement sur l'App Service existant
      # Utilise le Publish Profile (secret AZURE_WEBAPP_PUBLISH_PROFILE)
      # Principe moindre privilège : ce profil ne donne accès qu'à sn-dev-app,
      # rien d'autre sur l'abonnement Azure.
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./app/backend
