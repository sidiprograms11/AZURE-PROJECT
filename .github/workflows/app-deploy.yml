# ===============================================================================
# WORKFLOW : Déploiement du Code de l'Application Smart Notes
# DÉCLENCHEMENT : Manuel (workflow_dispatch) ou automatique après validation de PR.
# NOTE CRITIQUE : Ce workflow ne crée PAS l'infrastructure. L'App Service doit
# déjà exister et avoir été créé préalablement via le workflow 'infra-deploy.yml'.
# ===============================================================================

name: Application Code Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'app/**'

jobs:
  build-and-deploy:
    name: Build & Deploy App
    runs-on: ubuntu-latest

    steps:
      # 1. Récupération du Code
      - name: Checkout Code
        uses: actions/checkout@v4

      # =======================================================================
      # CONFIGURATION RUNTIME (Au choix du Rôle 1 - exemple Node.js ici)
      # =======================================================================
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './app/frontend/package-lock.json' # Ajuster selon le setup réel

      # Exemple alternatif pour .NET Core :
      # - name: Setup .NET SDK
      #   uses: actions/setup-dotnet@v4
      #   with:
      #     dotnet-version: '8.0.x'

      # 2. Build de l'Application (Compilation, tests et package de sortie)
      # TODO: Le Rôle 1 écrira les étapes réelles ici.
      - name: Install Dependencies and Build
        run: |
          echo "Simulation du build de l'application..."
          # cd app/backend && npm install && npm run build
          # cd ../frontend && npm install && npm run build

      # 3. Connexion à Azure
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 4. Déploiement sur le Web App existant
      # Utilise le secret AZURE_WEBAPP_NAME (contenant ex: sn-dev-app)
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }} # Nom de l'App Service cible (ex: sn-dev-app)
          # Optionnel : publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }} (si connexion par profil)
          package: . # Répertoire contenant le package de build
